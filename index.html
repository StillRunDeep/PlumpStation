<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨水泵房智能设计系统</title>
<style>
:root {
  --c-primary: #1a3a5c;
  --c-ag00: #1e7e44;
  --c-ag11: #1a5f8a;
  --c-ag12: #7d5a00;
  --c-ag21: #5e2d7e;
  --c-pass: #27ae60;
  --c-warn: #e67e22;
  --c-error: #c0392b;
  --radius: 8px;
  --shadow: 0 2px 10px rgba(0,0,0,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #f0f4f8;
  color: #2d3748;
  min-height: 100vh;
}

/* ── Header ── */
.page-header {
  background: var(--c-primary);
  color: #fff;
  padding: 20px 32px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.page-header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; }
.page-header p  { font-size: 0.85rem; opacity: 0.75; margin-top: 4px; }

/* ── Main container ── */
main { max-width: 1100px; margin: 28px auto; padding: 0 16px; }

/* ── Input panel ── */
.input-panel {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px 28px;
  margin-bottom: 24px;
}
.input-panel h2 {
  font-size: 1rem;
  color: var(--c-primary);
  margin-bottom: 18px;
  padding-bottom: 8px;
  border-bottom: 2px solid #e2e8f0;
}
.form-row {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 14px;
}
.form-group {
  display: flex;
  flex-direction: column;
  flex: 1 1 160px;
}
.form-group label {
  font-size: 0.8rem;
  color: #64748b;
  margin-bottom: 5px;
  font-weight: 600;
}
.form-group input {
  padding: 9px 12px;
  border: 1.5px solid #cbd5e1;
  border-radius: 6px;
  font-size: 0.95rem;
  transition: border-color .2s;
  width: 100%;
}
.form-group input:focus {
  outline: none;
  border-color: var(--c-primary);
}
.input-hint { font-size: 0.72rem; color: #94a3b8; margin-top: 3px; }

details.advanced { margin-top: 4px; }
details.advanced summary {
  cursor: pointer;
  font-size: 0.82rem;
  color: #64748b;
  user-select: none;
  padding: 6px 0;
}
details.advanced summary:hover { color: var(--c-primary); }
.advanced-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 12px;
}

.btn-calc {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--c-primary);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 11px 28px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background .2s, transform .1s;
}
.btn-calc:hover  { background: #234a78; }
.btn-calc:active { transform: scale(.98); }

/* ── Results grid ── */
.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 700px) {
  .results-grid { grid-template-columns: 1fr; }
}

/* ── Agent card ── */
.agent-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 13px 18px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-header h3 { font-size: 0.95rem; font-weight: 700; }
.card-header .agent-id {
  font-size: 0.75rem;
  opacity: 0.8;
  background: rgba(255,255,255,0.15);
  padding: 2px 8px;
  border-radius: 12px;
}
.card-body { padding: 16px 18px; }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.78rem;
  font-weight: 700;
  margin-bottom: 12px;
}
.badge-pass  { background: #dcfce7; color: #166534; }
.badge-warn  { background: #fef9c3; color: #854d0e; }
.badge-error { background: #fee2e2; color: #991b1b; }

.msg-list { list-style: none; padding: 0; }
.msg-list li {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  font-size: 0.85rem;
  margin-bottom: 5px;
}
.err-item::before  { content: '✗'; color: var(--c-error); flex-shrink: 0; }
.warn-item::before { content: '⚠'; color: var(--c-warn);  flex-shrink: 0; }

/* ── Steps table ── */
.steps-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
  margin-bottom: 14px;
}
.steps-table th {
  background: #f1f5f9;
  color: #475569;
  padding: 6px 10px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1.5px solid #e2e8f0;
}
.steps-table td {
  padding: 6px 10px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: top;
}
.steps-table tr:last-child td { border-bottom: none; }
.steps-table tr:nth-child(even) td { background: #fafafa; }
.steps-table td:nth-child(2) { color: #64748b; font-family: monospace; font-size: 0.79rem; }
.steps-table td:last-child    { font-weight: 600; color: #1e3a5f; text-align: right; white-space: nowrap; }

/* ── Summary box ── */
.summary-box {
  background: #f8fafc;
  border: 1.5px solid #e2e8f0;
  border-radius: 6px;
  padding: 12px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.summary-item { flex: 1 1 120px; text-align: center; }
.summary-item .val {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--c-primary);
  line-height: 1.2;
}
.summary-item .lbl { font-size: 0.73rem; color: #64748b; margin-top: 2px; }

/* ── Water level diagram ── */
.wl-diagram {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  margin-top: 12px;
}
.pool-visual {
  position: relative;
  width: 60px;
  flex-shrink: 0;
  background: #e0f2fe;
  border: 2px solid #0284c7;
  border-top: none;
  border-radius: 0 0 4px 4px;
}
.pool-water {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, #0ea5e9, #7dd3fc);
  opacity: 0.55;
}
.pool-tick {
  position: absolute;
  left: 0; right: 0;
  border-top: 1.5px dashed;
  font-size: 9px;
  font-weight: 700;
  padding-left: 3px;
  line-height: 1.1;
  white-space: nowrap;
}
.wl-legend { flex: 1; font-size: 0.8rem; }
.wl-legend table { border-collapse: collapse; width: 100%; }
.wl-legend td { padding: 4px 6px; }
.wl-legend td:first-child { font-weight: 700; width: 28px; text-align: center; }
.wl-legend td:last-child   { font-weight: 700; color: #1e3a5f; }

/* header colors */
.hdr-ag00 { background: var(--c-ag00); }
.hdr-ag11 { background: var(--c-ag11); }
.hdr-ag12 { background: var(--c-ag12); }
.hdr-ag21 { background: var(--c-ag21); }
</style>
</head>
<body>

<header class="page-header">
  <h1>雨水泵房智能设计系统</h1>
  <p>输入设计参数，自动完成单泵规格 · 维护间尺寸 · 集水池深度全流程计算</p>
</header>

<main>
  <!-- 输入面板 -->
  <div class="input-panel">
    <h2>设计参数输入</h2>
    <div class="form-row">
      <div class="form-group">
        <label>总设计流量 Q</label>
        <input type="number" id="inp-Q" min="0.1" step="1" placeholder="如：360">
        <span class="input-hint">单位：m³/h，需 &gt; 0</span>
      </div>
      <div class="form-group">
        <label>工作水泵台数 N</label>
        <input type="number" id="inp-N" min="1" max="6" step="1" placeholder="如：3">
        <span class="input-hint">整数，建议 2～6 台（R-OP-02）</span>
      </div>
      <div class="form-group">
        <label>集水池占地面积 S</label>
        <input type="number" id="inp-S" min="0.1" step="0.1" placeholder="如：4">
        <span class="input-hint">单位：m²，需 &gt; 0</span>
      </div>
    </div>

    <details class="advanced">
      <summary>▾ 高级参数（可选，留空使用默认值）</summary>
      <div class="advanced-grid">
        <div class="form-group">
          <label>电机功率 P（kW）</label>
          <input type="number" id="inp-P" min="0" step="1" placeholder="默认 30">
          <span class="input-hint">&gt;55 kW 适用大型泵间距规则（R-LA-03）</span>
        </div>
        <div class="form-group">
          <label>出水口超高 h_out（m）</label>
          <input type="number" id="inp-hout" min="0" step="0.1" placeholder="默认 1.0">
          <span class="input-hint">集水池顶到出水排放点高差，影响扬程</span>
        </div>
        <div class="form-group">
          <label>出水管总长 L_pipe（m）</label>
          <input type="number" id="inp-lpipe" min="0" step="1" placeholder="默认 50">
          <span class="input-hint">用于估算沿程摩擦损失（R-HY-02）</span>
        </div>
      </div>
    </details>

    <button class="btn-calc" id="btn-calc">▶ 开始计算</button>
  </div>

  <!-- 结果区 -->
  <div class="results-grid" id="results" style="display:none">
    <div class="agent-card" id="card-ag00"></div>
    <div class="agent-card" id="card-ag11"></div>
    <div class="agent-card" id="card-ag12"></div>
    <div class="agent-card" id="card-ag21"></div>
  </div>
</main>

<script>
/* ───────────────────────── 工具函数 ───────────────────────── */
const DN_SERIES = [100,125,150,200,250,300,350,400,450,500,600,700,800];

function selectDN(d_mm) {
  for (const dn of DN_SERIES) { if (dn >= d_mm) return dn; }
  return 800;
}

function ceilTo1(v) { return Math.ceil(v * 10) / 10; }

function f(v, d) { return Number(v).toFixed(d !== undefined ? d : 2); }

function row(name, formula, value, unit) {
  return '<tr><td>' + name + '</td><td>' + formula + '</td><td>' + value + ' ' + unit + '</td></tr>';
}

function table(rows) {
  return '<table class="steps-table"><thead><tr><th>参数</th><th>计算式</th><th>结果</th></tr></thead><tbody>' +
    rows.join('') + '</tbody></table>';
}

/* ───────────────────────── AG0-0：输入校验 ───────────────────────── */
function runAG00(Q, N, S) {
  var errors = [], warnings = [];
  if (isNaN(Q) || Q <= 0)                      errors.push('总设计流量 Q 必须为正数（当前：' + Q + '）');
  if (isNaN(N) || N < 1 || !Number.isInteger(N)) errors.push('工作泵台数 N 必须为正整数（当前：' + N + '）');
  if (isNaN(S) || S <= 0)                      errors.push('集水池占地面积 S 必须为正数（当前：' + S + '）');
  if (!isNaN(N) && N > 6)  warnings.push('N = ' + N + ' 台，超出 R-OP-02 建议上限（≤6 台），并联效率将下降');
  if (!isNaN(N) && N === 1) warnings.push('单泵运行可靠性低，建议至少配置 2 台工作泵（R-OP-03）');
  return { valid: errors.length === 0, errors: errors, warnings: warnings };
}

/* ───────────────────────── AG1-1：单泵规格 ───────────────────────── */
function runAG11(Q, N) {
  var Q_single   = Q / N;
  var q          = Q_single / 3600;
  var v          = 1.0;
  var D_inner_mm = Math.sqrt(4 * q / (Math.PI * v)) * 1000;
  var D_nominal  = selectDN(D_inner_mm);
  var overDN800  = D_inner_mm > 800;
  var rows = [
    row('单泵设计流量 Q_single', 'Q / N = ' + f(Q) + ' / ' + N, f(Q_single), 'm³/h'),
    row('单泵秒流量 q', 'Q_single / 3600', f(q, 5), 'm³/s'),
    row('设计管道流速 v', '推荐取 1.0 m/s（R-HY-02）', f(v), 'm/s'),
    row('计算内径 D_inner', '√(4q / πv)', f(D_inner_mm), 'mm'),
    row('标准公称内径 DN', '向上取 DN 系列 ≥ ' + f(D_inner_mm) + ' mm', 'DN' + D_nominal, '')
  ];
  return { Q_single: Q_single, q: q, v: v, D_inner_mm: D_inner_mm, D_nominal: D_nominal, overDN800: overDN800, rows: rows };
}

/* ───────────────────────── AG1-2：维护间尺寸 ───────────────────────── */
function runAG12(N, motorPower, w_pump, d_pump) {
  motorPower = motorPower || 30;
  w_pump     = w_pump     || 0.6;
  d_pump     = d_pump     || 0.8;
  var large     = motorPower > 55;
  var d_spacing = large ? 1.2 : 1.0;
  var e_wall    = large ? 1.0 : 0.8;
  var L_raw     = N * w_pump + (N - 1) * d_spacing + 2 * e_wall;
  var L         = ceilTo1(L_raw);
  var W_aisle   = 1.2;
  var W_equip   = d_pump + 0.5;
  var W         = Math.max(2.5, ceilTo1(Math.max(W_aisle, W_equip) + 0.3));
  var ruleNote  = large ? 'R-LA-01/03：大型泵 ≥1.2 m' : 'R-LA-01：一般泵 ≥1.0 m';
  var wallNote  = large ? 'R-LA-02/03：大型泵 ≥1.0 m' : 'R-LA-02：一般泵 ≥0.8 m';
  var rows = [
    row('水泵外形宽度 w_pump', '中小型离心泵典型值', f(w_pump), 'm'),
    row('水泵外形深度 d_pump', '含电机联轴器', f(d_pump), 'm'),
    row('电机功率判断', large ? 'P > 55 kW，适用大型泵规则 R-LA-03' : 'P ≤ 55 kW，适用一般规则', motorPower + '', 'kW'),
    row('泵间净距 d_spacing', ruleNote, f(d_spacing), 'm'),
    row('端部距墙净距 e_wall', wallNote, f(e_wall), 'm'),
    row('维护间净长 L', N+'×'+f(w_pump)+' + '+(N-1)+'×'+f(d_spacing)+' + 2×'+f(e_wall)+' → 向上取 0.1 m', f(L), 'm'),
    row('最小通道宽 W_aisle', 'R-LA-05：维护通道 ≥1.2 m', f(W_aisle), 'm'),
    row('设备占宽 W_equip', 'd_pump + 0.5（含出水管附件）', f(W_equip), 'm'),
    row('维护间净宽 W', 'max(W_aisle, W_equip) + 0.3，取 ≥2.5 m', f(W), 'm')
  ];
  return { d_spacing: d_spacing, e_wall: e_wall, L: L, W: W, rows: rows };
}

/* ───────────────────────── AG2-1：水池体积深度 ───────────────────────── */
function runAG21(Q_single, N, S, h_out, L_pipe) {
  h_out  = h_out  || 1.0;
  L_pipe = L_pipe || 50;
  var Z        = 6;
  var V_min    = Q_single / (4 * Z);
  var h_active = Math.max(0.5, V_min / S);
  var h_sub    = 0.5;
  var h_res    = 0.3;
  var h_free   = 0.3;
  var h_pool   = ceilTo1(h_sub + h_active + h_res + h_free);
  var stopLevel  = h_sub;
  var startLevel = parseFloat((stopLevel + h_active).toFixed(3));
  var alarmLevel = parseFloat((startLevel + h_free).toFixed(3));
  var startLevels = [];
  for (var i = 0; i < N; i++) startLevels.push(parseFloat((startLevel + i * 0.2).toFixed(2)));
  var H_static   = h_pool + h_out;
  var H_friction = L_pipe * 0.003;
  var H_local    = H_friction * 0.4;
  var H          = (H_static + H_friction + H_local) * 1.08;
  var rows = [
    row('最大启动次数 Z', 'R-CM-02：Motor.maxStartsPerHour，取保守值', Z + '', '次/h'),
    row('最小有效容积 V_min', 'Q_single / (4Z) = ' + f(Q_single) + ' / (4×' + Z + ')（R-CM-01）', f(V_min), 'm³'),
    row('有效调节水深 h_active', 'V_min / S = ' + f(V_min) + ' / ' + f(S) + '，取 ≥0.5 m', f(h_active), 'm'),
    row('淹没深度 h_sub', 'R-CM-03：停泵水位高于泵进口 ≥0.5 m', f(h_sub), 'm'),
    row('底部沉淀区 h_res', 'R-CM-05：底坡 ≥1:10，预留 0.3 m', f(h_res), 'm'),
    row('超高余量 h_free', '报警水位以上保护余量', f(h_free), 'm'),
    row('集水池总深度 h_pool', 'h_sub + h_active + h_res + h_free → 向上取 0.1 m', f(h_pool), 'm'),
    row('停泵水位 stopLevel', '= h_sub（R-CM-03）', f(stopLevel), 'm'),
    row('首台启泵水位 startLevel', 'stopLevel + h_active（R-CM-04）', f(startLevel), 'm'),
    row('报警水位 alarmLevel', 'startLevel + h_free（R-CM-04）', f(alarmLevel), 'm'),
    row('静扬程 H_static', 'h_pool + h_out = ' + f(h_pool) + ' + ' + f(h_out), f(H_static), 'm'),
    row('沿程摩擦损失 H_friction', 'L_pipe × 0.003 = ' + L_pipe + ' × 0.003', f(H_friction), 'm'),
    row('局部阻力损失 H_local', 'H_friction × 0.4（弯头、止回阀、闸阀）', f(H_local), 'm'),
    row('水泵设计扬程 H', '(H_static + H_friction + H_local) × 1.08（R-HY-02）', f(H), 'm')
  ];
  return {
    Z: Z, V_min: V_min, h_active: h_active, h_pool: h_pool,
    stopLevel: stopLevel, startLevel: startLevel, alarmLevel: alarmLevel, startLevels: startLevels,
    H_static: H_static, H_friction: H_friction, H_local: H_local, H: H, rows: rows
  };
}

/* ───────────────────────── 渲染函数 ───────────────────────── */
function renderAG00(r) {
  var badgeCls = r.valid ? 'badge-pass' : 'badge-error';
  var badgeTxt = r.valid ? '✓ 输入校验通过' : '✗ 输入存在错误';
  var html = '<div class="card-header hdr-ag00"><h3>AG0-0 输入校验</h3>' +
    '<span class="agent-id">用户对话</span></div><div class="card-body">' +
    '<span class="badge ' + badgeCls + '">' + badgeTxt + '</span>';

  if (r.errors.length) {
    html += '<ul class="msg-list">' +
      r.errors.map(function(e) { return '<li class="err-item">' + e + '</li>'; }).join('') + '</ul>';
  }
  if (r.warnings.length) {
    html += '<ul class="msg-list">' +
      r.warnings.map(function(w) { return '<li class="warn-item">' + w + '</li>'; }).join('') + '</ul>';
  }
  if (r.valid && r.warnings.length === 0) {
    html += '<p style="font-size:.85rem;color:#64748b;margin-top:4px">三项参数均在合法范围内，已传递至下游计算模块。</p>';
  }
  return html + '</div>';
}

function renderAG11(r) {
  var warn = r.overDN800
    ? '<span class="badge badge-warn">⚠ 计算管径超出 DN800，建议与厂家确认定制管径</span>' : '';
  return '<div class="card-header hdr-ag11"><h3>AG1-1 单泵规格计算</h3>' +
    '<span class="agent-id">水泵选型</span></div><div class="card-body">' + warn +
    table(r.rows) +
    '<div class="summary-box">' +
      '<div class="summary-item"><div class="val">' + f(r.Q_single) + '</div><div class="lbl">单泵流量 Q_single (m³/h)</div></div>' +
      '<div class="summary-item"><div class="val">DN' + r.D_nominal + '</div><div class="lbl">排水管公称内径</div></div>' +
      '<div class="summary-item"><div class="val">' + f(r.D_inner_mm) + '</div><div class="lbl">计算内径 (mm)</div></div>' +
    '</div></div>';
}

function renderAG12(r) {
  return '<div class="card-header hdr-ag12"><h3>AG1-2 水泵维护间尺寸</h3>' +
    '<span class="agent-id">平面布置</span></div><div class="card-body">' +
    table(r.rows) +
    '<div class="summary-box">' +
      '<div class="summary-item"><div class="val">' + f(r.L) + ' m</div><div class="lbl">维护间净长 L</div></div>' +
      '<div class="summary-item"><div class="val">' + f(r.W) + ' m</div><div class="lbl">维护间净宽 W</div></div>' +
      '<div class="summary-item"><div class="val">' + f(r.L) + ' × ' + f(r.W) + '</div><div class="lbl">平面尺寸 (m × m)</div></div>' +
    '</div></div>';
}

function renderAG21(r) {
  // 梯级启泵水位表（N > 1 时）
  var staggerHtml = '';
  if (r.startLevels.length > 1) {
    var lvlRows = r.startLevels.map(function(lv, i) {
      return '<tr><td>泵 ' + (i+1) + '</td><td>startLevel + ' + f(i*0.2) + '（R-CL-01）</td><td>' + f(lv) + ' m</td></tr>';
    }).join('');
    staggerHtml = '<p style="font-size:.8rem;font-weight:700;color:#5e2d7e;margin:10px 0 4px">梯级启泵水位（R-CL-01）</p>' +
      '<table class="steps-table"><thead><tr><th>水泵</th><th>计算式</th><th>启泵水位</th></tr></thead><tbody>' +
      lvlRows + '</tbody></table>';
  }

  // 水位示意图
  var PX_H = 180;
  var totalH    = r.h_pool;
  var stopPct   = (r.stopLevel  / totalH * 100).toFixed(1);
  var startPct  = (r.startLevel / totalH * 100).toFixed(1);
  var alarmPct  = (r.alarmLevel / totalH * 100).toFixed(1);
  var waterPct  = startPct; // 示意水位取启泵水位高度

  var diagram = '<div class="wl-diagram">' +
    '<div style="display:flex;flex-direction:column;align-items:center">' +
      '<span style="font-size:.72rem;color:#64748b;margin-bottom:4px">截面示意</span>' +
      '<div class="pool-visual" style="height:' + PX_H + 'px">' +
        '<div class="pool-water" style="height:' + waterPct + '%"></div>' +
        '<div class="pool-tick" style="bottom:' + stopPct + '%;color:#e74c3c;border-color:#e74c3c">停泵</div>' +
        '<div class="pool-tick" style="bottom:' + startPct + '%;color:#2980b9;border-color:#2980b9">启泵</div>' +
        '<div class="pool-tick" style="bottom:' + alarmPct + '%;color:#e67e22;border-color:#e67e22">报警</div>' +
      '</div>' +
    '</div>' +
    '<div class="wl-legend"><table>' +
      '<tr><td>🔴</td><td>停泵水位</td><td>' + f(r.stopLevel) + ' m</td></tr>' +
      '<tr><td>🔵</td><td>启泵水位（泵1）</td><td>' + f(r.startLevel) + ' m</td></tr>' +
      '<tr><td>🟠</td><td>报警水位</td><td>' + f(r.alarmLevel) + ' m</td></tr>' +
      '<tr><td>⬜</td><td>集水池总深度</td><td>' + f(r.h_pool) + ' m</td></tr>' +
    '</table></div></div>';

  return '<div class="card-header hdr-ag21"><h3>AG2-1 水池体积与扬程</h3>' +
    '<span class="agent-id">结构设计</span></div><div class="card-body">' +
    table(r.rows) + staggerHtml +
    '<div class="summary-box" style="margin-bottom:12px">' +
      '<div class="summary-item"><div class="val">' + f(r.V_min) + '</div><div class="lbl">最小有效容积 V_min (m³)</div></div>' +
      '<div class="summary-item"><div class="val">' + f(r.h_pool) + ' m</div><div class="lbl">集水池总深度 h_pool</div></div>' +
      '<div class="summary-item"><div class="val">' + f(r.H) + ' m</div><div class="lbl">水泵设计扬程 H</div></div>' +
    '</div>' + diagram + '</div>';
}

function emptyCard(hdrCls, title, sub) {
  return '<div class="card-header ' + hdrCls + '"><h3>' + title + '</h3>' +
    '<span class="agent-id">' + sub + '</span></div>' +
    '<div class="card-body"><p style="color:#94a3b8;font-size:.85rem">请先修正输入错误后重新计算。</p></div>';
}

/* ───────────────────────── 主控制器 ───────────────────────── */
function runCalc() {
  var Q      = parseFloat(document.getElementById('inp-Q').value);
  var N      = parseInt(document.getElementById('inp-N').value, 10);
  var S      = parseFloat(document.getElementById('inp-S').value);
  var P      = parseFloat(document.getElementById('inp-P').value)     || 30;
  var h_out  = parseFloat(document.getElementById('inp-hout').value)  || 1.0;
  var L_pipe = parseFloat(document.getElementById('inp-lpipe').value) || 50;

  var ag00 = runAG00(Q, N, S);
  document.getElementById('card-ag00').innerHTML = renderAG00(ag00);
  document.getElementById('results').style.display = 'grid';

  if (!ag00.valid) {
    document.getElementById('card-ag11').innerHTML = emptyCard('hdr-ag11', 'AG1-1 单泵规格计算', '水泵选型');
    document.getElementById('card-ag12').innerHTML = emptyCard('hdr-ag12', 'AG1-2 水泵维护间尺寸', '平面布置');
    document.getElementById('card-ag21').innerHTML = emptyCard('hdr-ag21', 'AG2-1 水池体积与扬程', '结构设计');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    return;
  }

  var ag11 = runAG11(Q, N);
  document.getElementById('card-ag11').innerHTML = renderAG11(ag11);

  var ag12 = runAG12(N, P);
  document.getElementById('card-ag12').innerHTML = renderAG12(ag12);

  var ag21 = runAG21(ag11.Q_single, N, S, h_out, L_pipe);
  document.getElementById('card-ag21').innerHTML = renderAG21(ag21);

  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

document.getElementById('btn-calc').addEventListener('click', runCalc);
document.querySelectorAll('.input-panel input').forEach(function(el) {
  el.addEventListener('keydown', function(e) { if (e.key === 'Enter') runCalc(); });
});
</script>
</body>
</html>
