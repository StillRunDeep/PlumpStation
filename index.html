<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨水泵站智能设计系统</title>
<style>
:root {
  --color-primary: #1a5276;
  --color-ag00: #1e8449;
  --color-ag11: #2471a3;
  --color-ag12: #876404;
  --color-ag21: #6c3483;
  --color-pass: #27ae60;
  --color-warn: #e67e22;
  --color-error: #c0392b;
  --color-bg: #f4f6f8;
  --color-card: #ffffff;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.10);
  --font: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--color-bg);
  color: #2c3e50;
  line-height: 1.6;
  font-size: 14px;
}

.page-header {
  background: linear-gradient(135deg, var(--color-primary) 0%, #2e86c1 100%);
  color: white;
  padding: 28px 24px 22px;
  text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}
.page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
.page-header p  { font-size: 13px; opacity: 0.85; margin-top: 6px; }

main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }

/* ── Input Panel ── */
.input-panel {
  background: var(--color-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 28px;
}
.input-panel h2 { font-size: 16px; color: var(--color-primary); margin-bottom: 18px; border-bottom: 2px solid #d6eaf8; padding-bottom: 8px; }

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px 24px;
  margin-bottom: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 13px; font-weight: 600; color: #555; }
.form-group input {
  border: 1.5px solid #ccd6e0;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 14px;
  font-family: var(--font);
  transition: border-color .2s;
  background: #fafcfe;
}
.form-group input:focus { outline: none; border-color: #2e86c1; background: #fff; }
.form-group .hint { font-size: 11px; color: #888; }

details { margin-top: 10px; }
details summary {
  cursor: pointer;
  font-size: 13px;
  color: #2e86c1;
  font-weight: 600;
  padding: 4px 0;
  user-select: none;
}
details summary:hover { text-decoration: underline; }
details .adv-grid { margin-top: 12px; }

.btn-calculate {
  display: block;
  width: 100%;
  max-width: 280px;
  margin: 20px auto 0;
  padding: 12px 0;
  background: linear-gradient(135deg, #2e86c1, var(--color-primary));
  color: white;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--font);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: opacity .2s, transform .1s;
  box-shadow: 0 3px 8px rgba(30,82,118,0.35);
}
.btn-calculate:hover  { opacity: .92; }
.btn-calculate:active { transform: scale(.98); }

/* ── Results ── */
.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 720px) { .results-grid { grid-template-columns: 1fr; } }

.agent-card {
  background: var(--color-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 13px 18px;
  color: white;
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-header .agent-label { font-size: 12px; opacity: .8; }
.card-header .badge {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 20px;
  font-weight: 700;
  background: rgba(255,255,255,0.25);
}

.card-ag00 .card-header { background: var(--color-ag00); }
.card-ag11 .card-header { background: var(--color-ag11); }
.card-ag12 .card-header { background: var(--color-ag12); }
.card-ag21 .card-header { background: var(--color-ag21); }
.card-ag31 .card-header { background: #117a65; }
.card-ag31-wrap { grid-column: 1 / -1; }
#svg-ag31 { display: block; width: 100%; height: 520px; cursor: grab; background: #f4f6f8; }
#svg-ag31:active { cursor: grabbing; }
.svg-zoom-btn {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.45);
  color: white;
  border-radius: 4px;
  width: 26px; height: 26px;
  font-size: 17px; line-height: 1;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0; font-family: var(--font);
}
.svg-zoom-btn:hover { background: rgba(255,255,255,0.35); }

.card-body { padding: 16px 18px; }

.steps-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 14px;
}
.steps-table th {
  background: #eaf2fb;
  color: #2c3e50;
  font-size: 12px;
  padding: 6px 8px;
  text-align: left;
  border-bottom: 2px solid #d5e8f5;
}
.steps-table td {
  padding: 5px 8px;
  border-bottom: 1px solid #edf2f7;
  vertical-align: top;
}
.steps-table tr:last-child td { border-bottom: none; }
.steps-table tr:nth-child(even) td { background: #f9fbfe; }
.steps-table .formula { color: #555; font-size: 12px; font-family: 'Courier New', monospace; }
.steps-table .value { font-weight: 600; color: #1a5276; text-align: right; white-space: nowrap; }

.result-summary {
  border-radius: 7px;
  padding: 12px 14px;
  font-size: 13px;
  line-height: 2;
}
.result-summary.pass  { background: #eafaf1; border-left: 4px solid var(--color-pass); }
.result-summary.warn  { background: #fef9e7; border-left: 4px solid var(--color-warn); }
.result-summary.error { background: #fdedec; border-left: 4px solid var(--color-error); }
.result-summary .key-value { display: flex; justify-content: space-between; gap: 8px; }
.result-summary .kv-label { color: #555; }
.result-summary .kv-val   { font-weight: 700; font-size: 14px; color: #1a252f; }

.msg-list { list-style: none; padding: 0; font-size: 13px; }
.msg-list li { padding: 4px 0; display: flex; align-items: flex-start; gap: 6px; }
.msg-list .icon { flex-shrink: 0; }
.msg-list .err  { color: var(--color-error); }
.msg-list .wrn  { color: var(--color-warn); }
.msg-list .ok   { color: var(--color-pass); }

/* Water level diagram */
.wl-diagram {
  display: flex;
  align-items: flex-end;
  gap: 18px;
  margin-top: 10px;
  padding: 12px;
  background: #f0f4f8;
  border-radius: 8px;
}
.wl-pool {
  position: relative;
  width: 40px;
  flex-shrink: 0;
  border: 2px solid #5d6d7e;
  border-top: none;
  border-radius: 0 0 4px 4px;
  background: linear-gradient(to bottom, #d6eaf8, #a9cce3);
}
.wl-labels { flex: 1; position: relative; font-size: 11px; line-height: 1.3; }
.wl-tick {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}
.wl-tick .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.wl-tick .dot-alarm { background: #c0392b; }
.wl-tick .dot-start { background: #e67e22; }
.wl-tick .dot-stop  { background: #27ae60; }
.wl-tick .dot-pool  { background: #5d6d7e; }

[hidden] { display: none !important; }
</style>
</head>
<body>

<header class="page-header">
  <h1>雨水泵站智能设计系统</h1>
  <p>基于多 Agent 协作的雨水泵站参数自动计算 Demo</p>
</header>

<main>
  <!-- ══ 输入面板 ══ -->
  <section class="input-panel">
    <h2>设计参数输入</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>总设计流量 Q（m³/h）</label>
        <input type="number" id="inp-Q" min="0.01" step="1" placeholder="例：360">
        <span class="hint">泵站需排除的总设计流量</span>
      </div>
      <div class="form-group">
        <label>工作水泵台数 N（台）</label>
        <input type="number" id="inp-N" min="1" max="8" step="1" placeholder="例：3">
        <span class="hint">不含备用泵，建议 2～6 台</span>
      </div>
      <div class="form-group">
        <label>集水池占地面积 S（m²）</label>
        <input type="number" id="inp-S" min="0.1" step="0.1" placeholder="例：4">
        <span class="hint">集水池平面净面积</span>
      </div>
    </div>

    <details>
      <summary>高级参数（可选）</summary>
      <div class="form-grid adv-grid">
        <div class="form-group">
          <label>电机功率（kW）</label>
          <input type="number" id="inp-motor" min="1" step="1" placeholder="默认：30">
          <span class="hint">影响泵间距规则（R-LA-03）</span>
        </div>
        <div class="form-group">
          <label>出水口超高 h_outlet（m）</label>
          <input type="number" id="inp-h-outlet" min="0" step="0.1" placeholder="默认：1.0">
          <span class="hint">集水池底到出水排放点高差补充量</span>
        </div>
        <div class="form-group">
          <label>出水管总长（m）</label>
          <input type="number" id="inp-pipe-len" min="1" step="1" placeholder="默认：50">
          <span class="hint">用于估算管路摩擦损失</span>
        </div>
      </div>
    </details>

    <button class="btn-calculate" id="btn-calc">开始计算</button>
  </section>

  <!-- ══ 结果面板 ══ -->
  <section id="results-panel" hidden>
    <div class="results-grid">
      <div class="agent-card card-ag00">
        <div class="card-header">
          <span>AG0-0</span><span class="agent-label">用户对话 · 参数验证</span>
        </div>
        <div class="card-body" id="card-ag00"></div>
      </div>
      <div class="agent-card card-ag11">
        <div class="card-header">
          <span>AG1-1</span><span class="agent-label">单泵规格计算</span>
        </div>
        <div class="card-body" id="card-ag11"></div>
      </div>
      <div class="agent-card card-ag12">
        <div class="card-header">
          <span>AG1-2</span><span class="agent-label">水泵维护间尺寸计算</span>
        </div>
        <div class="card-body" id="card-ag12"></div>
      </div>
      <div class="agent-card card-ag21">
        <div class="card-header">
          <span>AG2-1</span><span class="agent-label">水池体积深度计算</span>
        </div>
        <div class="card-body" id="card-ag21"></div>
      </div>
      <div class="agent-card card-ag31 card-ag31-wrap">
        <div class="card-header">
          <span>AG3-1</span><span class="agent-label">二维表达 · 平面图 + A-A 剖面图</span>
          <div style="margin-left:auto;display:flex;gap:5px;align-items:center">
            <button class="svg-zoom-btn" id="btn-ag31-zin"  title="放大">＋</button>
            <button class="svg-zoom-btn" id="btn-ag31-rst"  title="复位">⊙</button>
            <button class="svg-zoom-btn" id="btn-ag31-zout" title="缩小">－</button>
          </div>
        </div>
        <div class="card-body" style="padding:0;overflow:hidden">
          <svg id="svg-ag31" viewBox="0 0 1080 580" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
// ══════════════════════════════════════════════
//  工具函数
// ══════════════════════════════════════════════

const DN_SERIES = [100, 125, 150, 200, 250, 300, 350, 400, 450, 500, 600, 700, 800];

function selectDN(d_mm) {
  for (const dn of DN_SERIES) {
    if (dn >= d_mm) return dn;
  }
  return DN_SERIES[DN_SERIES.length - 1];
}

function ceilTo01(v) {
  return Math.ceil(v * 10) / 10;
}

function fmt(v, decimals = 2) {
  return v.toFixed(decimals);
}

function stepRow(label, formula, value, unit) {
  return `<tr>
    <td>${label}</td>
    <td class="formula">${formula}</td>
    <td class="value">${value}&nbsp;<small>${unit}</small></td>
  </tr>`;
}

function stepsTable(rows) {
  return `<table class="steps-table">
    <thead><tr><th>参数</th><th>计算式</th><th style="text-align:right">结果</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

function kvRow(label, val) {
  return `<div class="key-value"><span class="kv-label">${label}</span><span class="kv-val">${val}</span></div>`;
}

// ══════════════════════════════════════════════
//  AG0-0：参数验证
// ══════════════════════════════════════════════

function runAG00(Q, N, S) {
  const errors = [];
  const warnings = [];

  if (isNaN(Q) || Q <= 0)
    errors.push('总设计流量 Q 必须为正数（m³/h）');

  if (isNaN(N) || !Number.isInteger(N) || N < 1)
    errors.push('工作泵台数 N 必须为正整数');
  else if (N > 6)
    warnings.push(`工作泵台数 N = ${N} 超过 6 台，超出规则 R-OP-02 推荐上限，效率可能下降`);
  else if (N === 1)
    warnings.push('单泵运行可靠性低，建议至少 2 台（R-OP-03）');

  if (isNaN(S) || S <= 0)
    errors.push('集水池占地面积 S 必须为正数（m²）');

  if (errors.length === 0 && !isNaN(Q) && !isNaN(N) && N >= 1) {
    const Qs = Q / N;
    if (Qs > 1000)
      warnings.push(`单泵流量 Q_single = ${fmt(Qs)} m³/h 偏大，请确认总流量单位是否正确`);
  }

  return { valid: errors.length === 0, errors, warnings, Q, N, S };
}

// ══════════════════════════════════════════════
//  AG1-1：单泵规格计算
// ══════════════════════════════════════════════

function runAG11(Q, N) {
  const Q_single = Q / N;
  const q = Q_single / 3600;
  const v = 1.0;
  const D_inner = Math.sqrt(4 * q / (Math.PI * v));
  const D_inner_mm = D_inner * 1000;
  const D_nominal = selectDN(D_inner_mm);
  const dnOverflow = D_inner_mm > 800;

  const rows = [
    stepRow('单泵设计流量 Q_single', `Q / N = ${fmt(Q)} / ${N} =`, fmt(Q_single), 'm³/h'),
    stepRow('单泵流量（m³/s）q', `Q_single / 3600 = ${fmt(Q_single)} / 3600 =`, fmt(q, 5), 'm³/s'),
    stepRow('设计管道流速 v', '取推荐值', fmt(v, 1), 'm/s'),
    stepRow('排水管计算内径 D', `√(4q / πv) = √(4×${fmt(q,5)} / π×${v}) =`, fmt(D_inner * 1000, 1), 'mm'),
    stepRow('排水管公称内径 DN', '向上取标准管径系列', `DN${D_nominal}`, 'mm'),
  ];

  return { Q_single, q, v, D_inner_mm, D_nominal, dnOverflow, rows };
}

// ══════════════════════════════════════════════
//  AG1-2：水泵维护间尺寸计算
// ══════════════════════════════════════════════

function runAG12(N, motorPower) {
  const w_pump    = 0.6;
  const d_pump    = 0.8;
  const d_spacing = motorPower > 55 ? 1.2 : 1.0;
  const e_wall    = motorPower > 55 ? 1.0 : 0.8;
  const L_raw     = N * w_pump + (N - 1) * d_spacing + 2 * e_wall;
  const L         = ceilTo01(L_raw);
  const W_equip   = d_pump + 0.5;
  const W_raw     = Math.max(1.2, W_equip) + 0.3;
  const W         = Math.max(2.5, ceilTo01(W_raw));

  const rows = [
    stepRow('单泵外形宽度 w_pump', '中小型离心泵典型值', fmt(w_pump, 1), 'm'),
    stepRow('单泵外形深度 d_pump', '含电机联轴器典型值', fmt(d_pump, 1), 'm'),
    stepRow('泵间净距 d_spacing', motorPower > 55 ? 'R-LA-01/03（大型泵）' : 'R-LA-01（一般水泵）', fmt(d_spacing, 1), 'm'),
    stepRow('端部距墙净距 e_wall', motorPower > 55 ? 'R-LA-02/03（大型泵）' : 'R-LA-02（一般水泵）', fmt(e_wall, 1), 'm'),
    stepRow('维护间净长 L', `N×w + (N-1)×d + 2×e = ${N}×${w_pump}+(${N-1})×${d_spacing}+2×${e_wall} =`, `${fmt(L_raw,2)} → ${fmt(L,1)}`, 'm'),
    stepRow('通道净宽 W_equip', `d_pump + 0.5 = ${d_pump} + 0.5 =`, fmt(W_equip, 1), 'm'),
    stepRow('维护间净宽 W', `max(1.2, ${fmt(W_equip,1)})+0.3，取≥2.5m =`, fmt(W, 1), 'm'),
  ];

  return { w_pump, d_pump, d_spacing, e_wall, L, W, rows };
}

// ══════════════════════════════════════════════
//  AG2-1：水池体积深度计算
// ══════════════════════════════════════════════

function runAG21(Q_single, N, S, h_outlet, pipe_length) {
  const Z           = 6;
  const V_min       = Q_single / (4 * Z);
  const h_active    = V_min / S;
  const h_sub       = 0.5;
  const h_reserve   = 0.3;
  const h_freeboard = 0.3;
  const h_pool_raw  = h_sub + h_active + h_reserve + h_freeboard;
  const h_pool      = ceilTo01(h_pool_raw);

  const stopLevel   = h_sub;
  const startLevel  = stopLevel + h_active;
  const alarmLevel  = startLevel + h_freeboard;

  const startLevels = [];
  for (let i = 0; i < N; i++) startLevels.push(+(startLevel + i * 0.2).toFixed(2));

  const H_static   = h_pool + h_outlet;
  const H_friction = pipe_length * 0.003;
  const H_local    = H_friction * 0.4;
  const H_raw      = H_static + H_friction + H_local;
  const H          = H_raw * 1.08;

  const rows = [
    stepRow('每小时最大启动次数 Z', '取保守值（R-CM-02，Motor.maxStartsPerHour）', Z, '次/h'),
    stepRow('最小有效容积 V_min', `Q_single/(4×Z) = ${fmt(Q_single)}/(4×${Z}) =`, fmt(V_min, 2), 'm³'),
    stepRow('有效调节水深 h_active', `V_min / S = ${fmt(V_min,2)} / ${fmt(S,1)} =`, fmt(h_active, 2), 'm'),
    stepRow('淹没保护深度 h_sub', '停泵防吸气（R-CM-03）', fmt(h_sub, 1), 'm'),
    stepRow('底部沉淀区 h_reserve', '池底坡度 ≥ 1:10（R-CM-05）', fmt(h_reserve, 1), 'm'),
    stepRow('超高 h_freeboard', '报警水位余量', fmt(h_freeboard, 1), 'm'),
    stepRow('集水池有效深度 h_pool', `${fmt(h_sub,1)}+${fmt(h_active,2)}+${fmt(h_reserve,1)}+${fmt(h_freeboard,1)} = ${fmt(h_pool_raw,2)} → 取整`, fmt(h_pool, 1), 'm'),
    stepRow('停泵水位 stopLevel', '距池底', fmt(stopLevel, 2), 'm'),
    stepRow('首泵启泵水位 startLevel', `stopLevel + h_active = ${fmt(stopLevel,2)}+${fmt(h_active,2)} =`, fmt(startLevel, 2), 'm'),
    stepRow('报警水位 alarmLevel', `startLevel + h_freeboard = ${fmt(startLevel,2)}+${fmt(h_freeboard,1)} =`, fmt(alarmLevel, 2), 'm'),
    stepRow('静扬程 H_static', `h_pool + h_outlet = ${fmt(h_pool,1)}+${fmt(h_outlet,1)} =`, fmt(H_static, 2), 'm'),
    stepRow('沿程摩擦损失 H_friction', `L×0.003 = ${pipe_length}×0.003 =`, fmt(H_friction, 3), 'm'),
    stepRow('局部阻力损失 H_local', `H_friction×0.4 = ${fmt(H_friction,3)}×0.4 =`, fmt(H_local, 3), 'm'),
    stepRow('水泵设计扬程 H', `(${fmt(H_static,2)}+${fmt(H_friction,3)}+${fmt(H_local,3)})×1.08（R-HY-02）=`, fmt(H, 2), 'm'),
  ];

  return {
    Z, V_min, h_active, h_sub, h_reserve, h_freeboard,
    h_pool, stopLevel, startLevel, alarmLevel, startLevels,
    H_static, H_friction, H_local, H, rows
  };
}

// ══════════════════════════════════════════════
//  渲染函数
// ══════════════════════════════════════════════

function renderAG00(r) {
  const status = r.valid ? (r.warnings.length > 0 ? 'warn' : 'pass') : 'error';
  const icon   = status === 'pass' ? '✔' : status === 'warn' ? '⚠' : '✘';
  const label  = status === 'pass' ? '验证通过' : status === 'warn' ? '通过（有警告）' : '验证失败';

  let msgs = '';
  r.errors.forEach(e   => { msgs += `<li><span class="icon err">✘</span> <span class="err">${e}</span></li>`; });
  r.warnings.forEach(w => { msgs += `<li><span class="icon wrn">⚠</span> <span class="wrn">${w}</span></li>`; });
  if (r.errors.length === 0 && r.warnings.length === 0)
    msgs = '<li><span class="icon ok">✔</span> <span class="ok">所有参数合法，可继续计算</span></li>';

  let summary = '';
  if (r.valid) {
    summary = `
      ${kvRow('总设计流量 Q', fmt(r.Q, 2) + ' m³/h')}
      ${kvRow('工作水泵台数 N', r.N + ' 台')}
      ${kvRow('集水池面积 S', fmt(r.S, 2) + ' m²')}
    `;
  }

  return `
    <div style="margin-bottom:12px">
      <span style="font-weight:700;color:var(--color-${status})">${icon} ${label}</span>
    </div>
    <ul class="msg-list">${msgs}</ul>
    ${r.valid ? `<div class="result-summary ${status}" style="margin-top:12px">${summary}</div>` : ''}
  `;
}

function renderAG11(r) {
  let warn = r.dnOverflow
    ? `<p style="color:var(--color-warn);font-size:12px;margin-top:8px">⚠ 计算管径超出标准系列上限 DN800，建议与厂家确认定制管径。</p>`
    : '';
  return `
    ${stepsTable(r.rows)}
    <div class="result-summary pass">
      ${kvRow('单泵设计流量', fmt(r.Q_single, 2) + ' m³/h')}
      ${kvRow('排水管计算内径', fmt(r.D_inner_mm, 1) + ' mm')}
      ${kvRow('排水管公称内径', 'DN ' + r.D_nominal + ' mm')}
    </div>
    ${warn}
  `;
}

function renderAG12(r) {
  return `
    ${stepsTable(r.rows)}
    <div class="result-summary pass">
      ${kvRow('泵间净距', fmt(r.d_spacing, 1) + ' m')}
      ${kvRow('端部距墙净距', fmt(r.e_wall, 1) + ' m')}

      ${kvRow('维护间净宽 W', fmt(r.W, 1) + ' m')}

  `;
}

function renderAG21(r) {
  // 梯级启泵水位表
  let lvlRows = r.startLevels.map((lv, i) =>

  ).join('');

  const staggerTable = `
    <p style="font-size:12px;font-weight:600;color:#555;margin:10px 0 4px">梯级启泵水位（R-CL-01）</p>
    <table class="steps-table">
      <thead><tr><th>水泵</th><th>启泵水位</th></tr></thead>
      <tbody>
        ${lvlRows}
        <tr><td>统一停泵水位</td><td>${fmt(r.stopLevel,2)} m</td></tr>
        <tr><td>报警水位</td><td>${fmt(r.alarmLevel,2)} m</td></tr>
      </tbody>
    </table>
  `;

  // 水位示意图
  const diagram = `
    <div class="wl-diagram">
      <div>
        <p style="font-size:11px;font-weight:600;color:#555;margin-bottom:6px">水位示意</p>
        <div class="wl-labels">
          <div class="wl-tick"><div class="dot dot-pool"></div><span>池顶 h_pool = ${fmt(r.h_pool,1)} m</span></div>
          <div class="wl-tick"><div class="dot dot-alarm"></div><span>报警 alarmLevel = ${fmt(r.alarmLevel,2)} m</span></div>
          <div class="wl-tick"><div class="dot dot-start"></div><span>启泵 startLevel = ${fmt(r.startLevel,2)} m</span></div>
          <div class="wl-tick"><div class="dot dot-stop"></div><span>停泵 stopLevel = ${fmt(r.stopLevel,2)} m</span></div>
        </div>
      </div>
    </div>
  `;

  return `
    ${stepsTable(r.rows)}
    <div class="result-summary pass">
      ${kvRow('最小有效容积 V_min', fmt(r.V_min, 2) + ' m³')}
      ${kvRow('有效调节水深', fmt(r.h_active, 2) + ' m')}
      ${kvRow('集水池有效深度 h_pool', fmt(r.h_pool, 1) + ' m')}
      ${kvRow('水泵设计扬程 H', fmt(r.H, 2) + ' m')}
    </div>
    ${staggerTable}
    ${diagram}
  `;
}

// ══════════════════════════════════════════════
//  主控制器
// ══════════════════════════════════════════════

function runCalculation() {
  const Q          = parseFloat(document.getElementById('inp-Q').value);
  const N          = parseInt(document.getElementById('inp-N').value, 10);
  const S          = parseFloat(document.getElementById('inp-S').value);
  const motorPower = parseFloat(document.getElementById('inp-motor').value) || 30;
  const h_outlet   = parseFloat(document.getElementById('inp-h-outlet').value);
  const pipe_len   = parseFloat(document.getElementById('inp-pipe-len').value);
  const hOut       = isNaN(h_outlet) ? 1.0 : h_outlet;
  const pLen       = isNaN(pipe_len) ? 50  : pipe_len;

  // AG0-0
  const ag00 = runAG00(Q, N, S);
  document.getElementById('card-ag00').innerHTML = renderAG00(ag00);

  const panel = document.getElementById('results-panel');
  panel.hidden = false;

  if (!ag00.valid) {
    document.getElementById('card-ag11').innerHTML = '<p style="color:#999;padding:8px">参数验证未通过，无法计算。</p>';
    document.getElementById('card-ag12').innerHTML = '<p style="color:#999;padding:8px">参数验证未通过，无法计算。</p>';
    document.getElementById('card-ag21').innerHTML = '<p style="color:#999;padding:8px">参数验证未通过，无法计算。</p>';
    panel.scrollIntoView({ behavior: 'smooth' });
    return;
  }

  // AG1-1
  const ag11 = runAG11(Q, N);
  document.getElementById('card-ag11').innerHTML = renderAG11(ag11);

  // AG1-2
  const ag12 = runAG12(N, motorPower);
  ag12.DN_label = ag11.D_nominal;
  document.getElementById('card-ag12').innerHTML = renderAG12(ag12);

  // AG2-1
  const ag21 = runAG21(ag11.Q_single, N, S, hOut, pLen);
  document.getElementById('card-ag21').innerHTML = renderAG21(ag21);

  // AG3-1
  runAG31(N, ag12, ag21, S);

  panel.scrollIntoView({ behavior: 'smooth' });
}

// ══════════════════════════════════════════════
//  AG3-1：SVG 二维表达（平面图 + A-A 剖面图）
// ══════════════════════════════════════════════

// ── SVG 辅助函数 ──
function _r(x,y,w,h,fill,stroke,sw,extra){
  sw=sw||1; extra=extra||'';
  return `<rect x="${(+x).toFixed(1)}" y="${(+y).toFixed(1)}" width="${(+w).toFixed(1)}" height="${(+h).toFixed(1)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" ${extra}/>`;
}
function _l(x1,y1,x2,y2,stroke,sw,dash){
  sw=sw||1;
  return `<line x1="${(+x1).toFixed(1)}" y1="${(+y1).toFixed(1)}" x2="${(+x2).toFixed(1)}" y2="${(+y2).toFixed(1)}" stroke="${stroke}" stroke-width="${sw}"${dash?` stroke-dasharray="${dash}"`:''}/>`;
}
function _t(x,y,txt,sz,fill,anchor,weight){
  anchor=anchor||'middle'; weight=weight||'normal';
  return `<text x="${(+x).toFixed(1)}" y="${(+y).toFixed(1)}" font-size="${sz}" fill="${fill}" text-anchor="${anchor}" font-weight="${weight}" font-family="Microsoft YaHei,sans-serif">${txt}</text>`;
}
function _poly(pts,fill){ return `<polygon points="${pts}" fill="${fill}"/>`; }

// 水平尺寸线
function _dh(x1,x2,y,label,clr){
  const tk=8,as=6; x1=+x1; x2=+x2; y=+y;
  const mid=(x1+x2)/2;
  return [
    _l(x1,y-tk,x1,y+tk,clr),_l(x2,y-tk,x2,y+tk,clr),_l(x1,y,x2,y,clr),
    _poly(`${x1},${y} ${x1+as},${y-as/2} ${x1+as},${y+as/2}`,clr),
    _poly(`${x2},${y} ${x2-as},${y-as/2} ${x2-as},${y+as/2}`,clr),
    _t(mid,y-6,label,11,clr)
  ].join('');
}

// 竖向尺寸线
function _dv(x,y1,y2,label,clr){
  const tk=8,as=6; x=+x; y1=+y1; y2=+y2;
  const mid=(y1+y2)/2, lx=x+20;
  return [
    _l(x-tk,y1,x+tk,y1,clr),_l(x-tk,y2,x+tk,y2,clr),_l(x,y1,x,y2,clr),
    _poly(`${x},${y1} ${x-as/2},${y1+as} ${x+as/2},${y1+as}`,clr),
    _poly(`${x},${y2} ${x-as/2},${y2-as} ${x+as/2},${y2-as}`,clr),
    `<text transform="translate(${lx.toFixed(1)},${mid.toFixed(1)}) rotate(-90)" font-size="11" fill="${clr}" text-anchor="middle" font-family="Microsoft YaHei,sans-serif">${label}</text>`
  ].join('');
}

// ── 主绘图函数 ──
function runAG31(N, ag12, ag21, S) {
  const { L, W, d_spacing, e_wall, w_pump, d_pump } = ag12;
  const { h_pool, V_min, stopLevel, startLevel, alarmLevel } = ag21;

  // 集水池平面尺寸（独立于维护间净长）
  const L_pool = Math.max(L, Math.sqrt(S * 1.5));
  const D_pool = S / L_pool;

  // 剖面图：泵房净高估算
  const room_H = Math.max(3.0, h_pool * 1.2 + 1.0);

  const VW = 1080, VH = 580;
  let s = '';

  // 背景
  s += _r(0,0,VW,VH,'#f4f6f8','none');
  // 分隔线
  s += _l(572,15,572,VH-15,'#ccc',1,'5,3');

  // ════════════════════════════════
  //  平面图（左半区）
  // ════════════════════════════════
  const PML=78, PMR=48, PMT=55, PMB=62;
  const PW=572, PH=VH;
  const pavw=PW-PML-PMR, pavh=PH-PMT-PMB;
  const ps=Math.min(pavw/L_pool, pavh/(W+D_pool));
  const pool_ox=PML+(pavw-L_pool*ps)/2;
  const room_ox=pool_ox+(L_pool-L)/2*ps;
  const room_oy=PMT+(pavh-(W+D_pool)*ps)/2;
  const room_x2=room_ox+L*ps;
  const room_y2=room_oy+W*ps;
  const pool_x2=pool_ox+L_pool*ps;
  const pool_y2=room_y2+D_pool*ps;
  const hdr_y=room_oy+Math.max(14,0.2*ps);

  s += _t(PW/2, PMT-14,'平 面 图（俯 视）',13,'#1a5276','middle','bold');

  // 集水池（平面）
  s += _r(pool_ox,room_y2,L_pool*ps,D_pool*ps,'#d6eaf8','#2471a3',2);
  const pcx=(pool_ox+pool_x2)/2, pcy=room_y2+D_pool*ps/2;
  s += _t(pcx,pcy-8,'集 水 池',13,'#1a5276','middle','bold');
  s += _t(pcx,pcy+8,`S=${fmt(S,1)}m²  h_pool=${fmt(h_pool,1)}m（竖向）`,10,'#1a5276');
  s += _t(pcx,pcy+21,'水位见右侧剖面图',9,'#888');
  // 共用墙（虚线）
  s += _l(room_ox,room_y2,room_x2,room_y2,'#5d6d7e',1.5,'4,3');

  // 维护间轮廓
  s += _r(room_ox,room_oy,L*ps,W*ps,'#eaf2fb','#2c3e50',2.5);

  // 出水总管
  s += _l(room_ox+e_wall*ps,hdr_y,room_x2-e_wall*ps,hdr_y,'#922b21',4);
  s += _t(room_ox+e_wall*ps+3,hdr_y-6,'DN'+ag12.DN_label+' 出水总管',10,'#922b21','start');

  // 控制柜（右上角）
  const cb_w=Math.min(45,e_wall*ps*0.9), cb_h=Math.min(26,0.3*ps);
  const cb_x=room_x2-e_wall*ps/2-cb_w/2, cb_y=hdr_y+6;
  s += _r(cb_x,cb_y,cb_w,cb_h,'#e67e22','#d35400');
  s += _t(cb_x+cb_w/2,cb_y+cb_h/2+4,'控制柜',9,'#fff','middle','bold');

  // 水泵机组 × N
  for(let i=0;i<N;i++){
    const px=room_ox+(e_wall+i*(w_pump+d_spacing))*ps;
    const py=room_y2-d_pump*ps;
    const pw=w_pump*ps, ph=d_pump*ps;
    const cx=px+pw/2;
    // 进水管（虚线）
    s += _l(cx,room_y2,cx,pool_y2-6,'#2980b9',1.5,'4,3');
    // 出水管
    s += _l(cx,py,cx,hdr_y,'#c0392b',1.5);
    // 止回阀（菱形）
    const cv_y=py-(py-hdr_y)*0.35, vs=5;
    s += _poly(`${cx},${cv_y-vs} ${cx+vs},${cv_y} ${cx},${cv_y+vs} ${cx-vs},${cv_y}`,'#e74c3c');
    // 闸阀（矩形）
    const gv_y=py-(py-hdr_y)*0.65;
    s += _r(cx-4,gv_y-4,8,8,'#e74c3c','#c0392b');
    // 泵体
    s += _r(px,py,pw,ph,'#2471a3','#1a5276',1.5);
    const fsz=Math.max(9,Math.min(12,pw*0.4));
    s += _t(cx,py+ph/2+4,'P'+(i+1),fsz,'#fff','middle','bold');
  }

  // A-A 剖面切线
  const aa_y=room_y2-d_pump*ps/2;
  s += _l(4,aa_y,room_ox-6,aa_y,'#7f8c8d',1,'6,3');
  s += _l(room_x2+6,aa_y,PW-6,aa_y,'#7f8c8d',1,'6,3');
  s += _t(5,aa_y-4,'A',11,'#555','start','bold');
  s += _t(PW-5,aa_y-4,'A',11,'#555','end','bold');

  // 尺寸标注（平面）
  const dim_by=pool_y2+28;
  s += _dh(room_ox,room_x2,dim_by,'L='+fmt(L,1)+'m','#1a3a5c');
  if(Math.abs(L_pool-L)>0.05)
    s += _dh(pool_ox,pool_x2,dim_by+22,'L_pool='+fmt(L_pool,1)+'m','#2471a3');
  const dim_rx=pool_x2+32;
  s += _dv(dim_rx,room_oy,room_y2,'W='+fmt(W,1)+'m','#1a3a5c');
  s += _dv(dim_rx,room_y2,pool_y2,'D='+fmt(D_pool,2)+'m','#2471a3');
  if(N>=2){
    const p0x=room_ox+(e_wall+w_pump)*ps, p1x=p0x+d_spacing*ps;
    const sp_y=room_y2-d_pump*ps*0.5;
    s += _dh(p0x,p1x,sp_y,'d='+fmt(d_spacing,1)+'m','#27ae60');
  }
  s += _dh(room_ox,room_ox+e_wall*ps,room_oy+18,'e='+fmt(e_wall,1)+'m','#8e44ad');

  // 图例（左上角）
  const legItems=[['#2471a3','水泵机组'],['#d6eaf8','集水池'],['#922b21','出水总管'],['#2980b9','进水管'],['#e74c3c','止回/闸阀'],['#e67e22','控制柜']];
  let lyi=room_oy;
  s += _r(4,lyi-2,94,legItems.length*17+4,'#fff','#ccc',0.5,'rx="3" opacity="0.9"');
  legItems.forEach(([c,lbl])=>{
    s += _r(7,lyi,11,11,c,'#666',0.5);
    s += _t(21,lyi+9,lbl,10,'#333','start');
    lyi+=17;
  });

  // 比例尺
  const bar_len=ps, bx=room_ox, by_bar=pool_y2+10;
  s += _l(bx,by_bar,bx+bar_len,by_bar,'#333',2);
  s += _l(bx,by_bar-4,bx,by_bar+4,'#333',1.5);
  s += _l(bx+bar_len,by_bar-4,bx+bar_len,by_bar+4,'#333',1.5);
  s += _t(bx+bar_len/2,by_bar-6,'1 m',10,'#333');

  // ════════════════════════════════
  //  A-A 剖面图（右半区）
  // ════════════════════════════════
  const SX0=580, SW=VW-SX0;
  const SML=65, SMR=80, SMT=55, SMB=55;
  const savw=SW-SML-SMR, savh=VH-SMT-SMB;
  const ss=Math.min(savw/(W+1.5), savh/(room_H+h_pool+0.5));

  const sec_cx=SX0+SML+savw/2;
  const sec_wx=W*ss;
  const sec_x1=sec_cx-sec_wx/2, sec_x2=sec_cx+sec_wx/2;
  const grade_y=SMT+room_H*ss;
  const room_top_y=SMT;
  const pool_bot_y=grade_y+h_pool*ss;

  const stop_y  =pool_bot_y-stopLevel*ss;
  const start_y =pool_bot_y-startLevel*ss;
  const alarm_y =pool_bot_y-alarmLevel*ss;

  s += _t(SX0+SW/2,SMT-14,'A-A 剖 面 图（沿 泵 轴）',13,'#1a5276','middle','bold');

  // 池壁底（地下部分背景）
  s += _r(sec_x1-6,grade_y,sec_wx+12,h_pool*ss+6,'#eaf2fb','none');

  // 水体填充（池底到报警水位）
  s += _r(sec_x1,alarm_y,sec_wx,pool_bot_y-alarm_y,'#d6eaf8','none');

  // 集水池池壁
  s += _r(sec_x1,grade_y,sec_wx,h_pool*ss,'none','#2471a3',2);

  // 泵房围护（地上）
  s += _r(sec_x1,room_top_y,sec_wx,room_H*ss,'#eaf2fb','#2c3e50',2.5);

  // 地坪线
  s += _l(SX0+4,grade_y,SX0+SW-4,grade_y,'#2c3e50',2);
  s += _t(sec_x1-5,grade_y+4,'±0.00',9,'#555','end');

  // 三水位线
  s += _l(sec_x1,stop_y, sec_x2,stop_y, '#27ae60',1.5,'5,3');
  s += _l(sec_x1,start_y,sec_x2,start_y,'#e67e22',1.5,'5,3');
  s += _l(sec_x1,alarm_y,sec_x2,alarm_y,'#c0392b',1.5,'5,3');

  // 水位标签（右侧）
  const wl_lx=sec_x2+6;
  s += _t(wl_lx,stop_y+4, '停泵 '+fmt(stopLevel,2)+'m', 10,'#27ae60','start');
  s += _t(wl_lx,start_y+4,'启泵 '+fmt(startLevel,2)+'m',10,'#e67e22','start');
  s += _t(wl_lx,alarm_y-3,'报警 '+fmt(alarmLevel,2)+'m',10,'#c0392b','start');
  s += _t(wl_lx,pool_bot_y+4,'池底 0.00m',10,'#555','start');

  // 水泵（剖面符号）
  const pump_w=Math.min(sec_wx*0.35,30), pump_h=Math.min(room_H*ss*0.25,28);
  const pump_x=sec_cx-pump_w/2, pump_y=grade_y-pump_h-4;
  s += _r(pump_x,pump_y,pump_w,pump_h,'#2471a3','#1a5276',1.5);
  s += _t(pump_x+pump_w/2,pump_y+pump_h/2+4,'P',10,'#fff','middle','bold');

  // 吸水管（进水管，向下进入集水池）
  const pcx_s=pump_x+pump_w/2;
  s += _l(pcx_s,pump_y+pump_h,pcx_s,pool_bot_y-6,'#2980b9',2);
  s += _poly(`${pcx_s},${pool_bot_y-6} ${pcx_s-4},${pool_bot_y-14} ${pcx_s+4},${pool_bot_y-14}`,'#2980b9');

  // 出水管（向上穿顶）
  const out_x=pcx_s+pump_w*0.35;
  s += _l(out_x,pump_y,out_x,room_top_y+4,'#c0392b',2);
  s += _poly(`${out_x},${room_top_y+4} ${out_x-4},${room_top_y+12} ${out_x+4},${room_top_y+12}`,'#c0392b');

  // 竖向尺寸标注（剖面）
  const sec_dvx=sec_x1-32;
  s += _dv(sec_dvx,room_top_y,grade_y,'室高 '+fmt(room_H,1)+'m','#1a3a5c');
  s += _dv(sec_dvx,grade_y,pool_bot_y,'h_pool='+fmt(h_pool,1)+'m','#2471a3');
  s += _dh(sec_x1,sec_x2,pool_bot_y+28,'W='+fmt(W,1)+'m','#1a3a5c');

  // ── 写入 SVG ──
  const el=document.getElementById('svg-ag31');
  el.setAttribute('viewBox',`0 0 ${VW} ${VH}`);
  el.innerHTML=s;
  initSvgZoomPan(el,VW,VH);
}

function initSvgZoomPan(svg,vw,vh){
  svg._zpclean && svg._zpclean();
  let vb={x:0,y:0,w:vw,h:vh};

  function applyVB(){
    svg.setAttribute('viewBox',`${vb.x.toFixed(1)} ${vb.y.toFixed(1)} ${vb.w.toFixed(1)} ${vb.h.toFixed(1)}`);
  }
  function onWheel(e){
    e.preventDefault();
    const f=e.deltaY>0?1.12:0.89;
    const rect=svg.getBoundingClientRect();
    const mx=(e.clientX-rect.left)/rect.width*vb.w+vb.x;
    const my=(e.clientY-rect.top)/rect.height*vb.h+vb.y;
    vb.w*=f; vb.h*=f;
    vb.x=mx-(e.clientX-rect.left)/rect.width*vb.w;
    vb.y=my-(e.clientY-rect.top)/rect.height*vb.h;
    applyVB();
  }
  let drag=false,last={x:0,y:0};
  function onDown(e){drag=true;last={x:e.clientX,y:e.clientY};svg.style.cursor='grabbing';e.preventDefault();}
  function onUp(){drag=false;svg.style.cursor='grab';}
  function onMove(e){
    if(!drag)return;
    const rect=svg.getBoundingClientRect();
    vb.x-=(e.clientX-last.x)/rect.width*vb.w;
    vb.y-=(e.clientY-last.y)/rect.height*vb.h;
    last={x:e.clientX,y:e.clientY};
    applyVB();
  }
  svg.addEventListener('wheel',onWheel,{passive:false});
  svg.addEventListener('mousedown',onDown);
  window.addEventListener('mouseup',onUp);
  window.addEventListener('mousemove',onMove);

  // ── 触摸支持（单指平移 + 双指捏合缩放）──
  let touch={active:false,last:{x:0,y:0},pinchDist:0};
  function pinchDist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
  function touchMid(t,rect){
    return {
      cx:((t[0].clientX+t[1].clientX)/2-rect.left)/rect.width*vb.w+vb.x,
      cy:((t[0].clientY+t[1].clientY)/2-rect.top)/rect.height*vb.h+vb.y,
      sx:(t[0].clientX+t[1].clientX)/2, sy:(t[0].clientY+t[1].clientY)/2
    };
  }
  function onTouchStart(e){
    e.preventDefault();
    const rect=svg.getBoundingClientRect();
    if(e.touches.length===1){
      touch.active=true;
      touch.last={x:e.touches[0].clientX,y:e.touches[0].clientY};
    } else if(e.touches.length===2){
      touch.active=false;
      touch.pinchDist=pinchDist(e.touches);
      const m=touchMid(e.touches,rect);
      touch.midSvg={x:m.cx,y:m.cy};
      touch.midScreen={x:m.sx,y:m.sy};
    }
  }
  function onTouchMove(e){
    e.preventDefault();
    const rect=svg.getBoundingClientRect();
    if(e.touches.length===1 && touch.active){
      vb.x-=(e.touches[0].clientX-touch.last.x)/rect.width*vb.w;
      vb.y-=(e.touches[0].clientY-touch.last.y)/rect.height*vb.h;
      touch.last={x:e.touches[0].clientX,y:e.touches[0].clientY};
      applyVB();
    } else if(e.touches.length===2){
      const d=pinchDist(e.touches);
      if(touch.pinchDist>0){
        const f=touch.pinchDist/d;
        vb.w*=f; vb.h*=f;
        vb.x=touch.midSvg.x-(touch.midScreen.x-rect.left)/rect.width*vb.w;
        vb.y=touch.midSvg.y-(touch.midScreen.y-rect.top)/rect.height*vb.h;
        touch.pinchDist=d;
        applyVB();
      }
    }
  }
  function onTouchEnd(e){ if(e.touches.length===0){touch.active=false;touch.pinchDist=0;} }
  svg.addEventListener('touchstart',onTouchStart,{passive:false});
  svg.addEventListener('touchmove',onTouchMove,{passive:false});
  svg.addEventListener('touchend',onTouchEnd);

  const zIn=document.getElementById('btn-ag31-zin');
  const zOut=document.getElementById('btn-ag31-zout');
  const zRst=document.getElementById('btn-ag31-rst');
  function zoomBy(f){const cx=vb.x+vb.w/2,cy=vb.y+vb.h/2;vb.w*=f;vb.h*=f;vb.x=cx-vb.w/2;vb.y=cy-vb.h/2;applyVB();}
  function doZin(){zoomBy(0.8);} function doZout(){zoomBy(1.25);}
  function doRst(){vb={x:0,y:0,w:vw,h:vh};applyVB();}
  if(zIn)zIn.addEventListener('click',doZin);
  if(zOut)zOut.addEventListener('click',doZout);
  if(zRst)zRst.addEventListener('click',doRst);

  svg._zpclean=()=>{
    svg.removeEventListener('wheel',onWheel);
    svg.removeEventListener('mousedown',onDown);
    window.removeEventListener('mouseup',onUp);
    window.removeEventListener('mousemove',onMove);
    svg.removeEventListener('touchstart',onTouchStart);
    svg.removeEventListener('touchmove',onTouchMove);
    svg.removeEventListener('touchend',onTouchEnd);
    if(zIn)zIn.removeEventListener('click',doZin);
    if(zOut)zOut.removeEventListener('click',doZout);
    if(zRst)zRst.removeEventListener('click',doRst);
  };
}

document.getElementById('btn-calc').addEventListener('click', runCalculation);

document.querySelectorAll('.input-panel input').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') runCalculation(); });
});
</script>
</body>
