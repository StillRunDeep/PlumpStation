<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨水泵站智能设计系统</title>
</head>
<body>

<header class="page-header">
  <h1>雨水泵站智能设计系统</h1>
  <p>基于多 Agent 协作的雨水泵站参数自动计算 Demo</p>
</header>

<main>
  <!-- ══ 输入面板 ══ -->
  <section class="input-panel">
    <h2>设计参数输入</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>总设计流量 Q（m³/h）</label>
        <input type="number" id="inp-Q" min="0.01" step="1" placeholder="例：360" value="75000">
        <span class="hint">泵站需排除的总设计流量</span>
      </div>
      <div class="form-group">
        <label>工作水泵台数 N（台）</label>
        <input type="number" id="inp-N" min="1" max="8" step="1" placeholder="例：3" value="3">
        <span class="hint">不含备用泵，建议 2～6 台</span>
      </div>
      <div class="form-group">
        <label>集水池占地面积 S（m²）</label>
        <input type="number" id="inp-S" min="0.1" step="0.1" placeholder="例：4" value="500">
        <span class="hint">集水池平面净面积</span>
      </div>
    </div>

    <details>
      <summary>高级参数（可选）</summary>
      <div class="form-grid adv-grid">
        <div class="form-group">
          <label>电机功率覆盖值（kW）</label>
          <input type="number" id="inp-motor" min="1" step="1" placeholder="默认：由 AG1-1 计算">
          <span class="hint">留空则使用 AG1-1 计算值；填入则强制覆盖（影响泵间距 R-LA-03）</span>
        </div>
        <div class="form-group">
          <label>出水口超高 h_outlet（m）</label>
          <input type="number" id="inp-h-outlet" min="0" step="0.1" placeholder="默认：1.0">
          <span class="hint">地面（集水池顶）到出水排放点高差</span>
        </div>
        <div class="form-group">
          <label>出水管总长（m）</label>
          <input type="number" id="inp-pipe-len" min="1" step="1" placeholder="默认：50">
          <span class="hint">用于估算管路摩擦损失</span>
        </div>
      </div>
    </details>

    <button class="btn-calculate" id="btn-calc">开始计算</button>
  </section>

  <!-- ══ 结果面板 ══ -->
  <section id="results-panel" hidden>
    <div class="results-grid">

      <!-- AG0-0 -->
      <div class="agent-card card-ag00">
        <div class="card-header">
          <span>AG0-0</span><span class="agent-label">用户对话 · 参数验证</span>
        </div>
        <div class="card-body" id="card-ag00"></div>
      </div>

      <!-- AG1-1 -->
      <div class="agent-card card-ag11">
        <div class="card-header">
          <span>AG1-1</span><span class="agent-label">单泵规格计算</span>
        </div>
        <div class="card-body" id="card-ag11"></div>
      </div>

      <!-- AG1-2 -->
      <div class="agent-card card-ag12">
        <div class="card-header">
          <span>AG1-2</span><span class="agent-label">水泵维护间尺寸计算</span>
        </div>
        <div class="card-body" id="card-ag12"></div>
      </div>

      <!-- AG2-1 -->
      <div class="agent-card card-ag21">
        <div class="card-header">
          <span>AG2-1</span><span class="agent-label">水池体积深度计算</span>
        </div>
        <div class="card-body" id="card-ag21"></div>
      </div>

      <!-- AG3-1: pump-room drawing -->
      <div class="agent-card card-ag31 card-ag31-wrap">
        <div class="card-header">
          <span>AG3-1</span><span class="agent-label">二维表达 · 平面图 + A-A 剖面图</span>
          <div style="margin-left:auto;display:flex;gap:5px;align-items:center">
            <button class="svg-zoom-btn" id="btn-ag31-zin"  title="放大">＋</button>
            <button class="svg-zoom-btn" id="btn-ag31-rst"  title="复位">⊙</button>
            <button class="svg-zoom-btn" id="btn-ag31-zout" title="缩小">－</button>
          </div>
        </div>
        <div class="card-body" style="padding:0;overflow:hidden">
          <svg id="svg-ag31" viewBox="0 0 1080 580" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>

      <!-- AG4-1: building layout generation -->
      <div class="agent-card card-ag41 card-ag41-wrap" id="card-ag41-wrap" hidden>
        <div class="card-header">
          <span>AG4-1</span>
          <span class="agent-label">建筑平面布局生成</span>
          <span class="badge" id="ag41-badge">3 种方案</span>
        </div>
        <div class="card-body">
          <div class="layout-variants" id="layout-variants"></div>
          <!-- Detail view (shown after selecting a variant) -->
          <div id="layout-detail-wrap" hidden>
            <div class="layout-detail-header">
              <span>选中方案详图（地面层 ＋ 一层）</span>
              <div style="margin-left:auto;display:flex;gap:5px">
                <button class="svg-zoom-btn" id="btn-ag41-zin"  title="放大">＋</button>
                <button class="svg-zoom-btn" id="btn-ag41-rst"  title="复位">⊙</button>
                <button class="svg-zoom-btn" id="btn-ag41-zout" title="缩小">－</button>
              </div>
            </div>
            <svg id="svg-ag41" viewBox="0 0 1080 560"
                 style="display:block;width:100%;height:560px;cursor:grab;background:#f4f6f8">
            </svg>
          </div>
        </div>
      </div>

    </div>
  </section>
</main>

<script type="module" src="/src/main.js"></script>
</body>
</html>
